name: voice_recording_app_gui
description: Capstone mobile app - Flutter UI with dark neumorphic style.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  record: ^6.0.0
  path_provider: ^2.1.0
  http: ^1.2.0
  path: ^1.9.0
  connectivity_plus: ^7.0.0
  shared_preferences: ^2.2.0
  permission_handler: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/voice_sentinel_logo.png
